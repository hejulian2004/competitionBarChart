name: Integrate danmaku fixes into main

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/integrate-danmaku-main.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Integrate responsive layout and danmaku
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main_path = Path("main.js")
          patch_path = Path("danmaku-fix.js")
          index_path = Path("index.html")
          workflow_path = Path(".github/workflows/integrate-danmaku-main.yml")

          main = main_path.read_text(encoding="utf-8")
          patch = patch_path.read_text(encoding="utf-8")
          index = index_path.read_text(encoding="utf-8")

          marker = "// BEGIN: integrated responsive layout and stable danmaku"
          if marker in main:
              raise SystemExit("main.js already contains integrated implementation")

          def replace_between(text, start_marker, end_marker, replacement):
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              return text[:start] + replacement.rstrip() + "\n\n" + text[end:]

          patch = replace_between(
              patch,
              "  function getBottomMargin() {",
              "  function getLayoutSignature() {",
              '''  function getBottomMargin() {
            return Math.max(24, Math.min(42, Math.round(HEIGHT * 0.035)));
          }

          function getAspectMode() {
            return document.querySelector("#aspectRatioModeInput")?.value || "16:9";
          }

          function getAspectBottomLift() {
            const ratio = {
              "16:9": 0,
              "3:4": 0.065,
              "4:5": 0.030,
              "9:16": 0.020
            }[getAspectMode()] || 0;
            return Math.round(HEIGHT * ratio);
          }

          function getDateBottomInset() {
            const ratio = {
              "16:9": 0,
              "3:4": 0.030,
              "4:5": 0.018,
              "9:16": 0.014
            }[getAspectMode()] || 0;
            return DATE_BOTTOM_PADDING + Math.round(HEIGHT * ratio);
          }
'''
          )

          patch = replace_between(
              patch,
              "  function getDanmakuLayout(key = \"\") {",
              "  function getPlotPanelBounds() {",
              '''  function wrapDanmakuText(text, maxWidth, fontSize, maximumLines = 3) {
            const characters = Array.from(String(text ?? "").trim());
            if (characters.length === 0) return [];

            const lines = [];
            let current = "";
            let index = 0;

            while (index < characters.length) {
              const candidate = current + characters[index];
              if (!current || measureLogicalText(candidate, fontSize, 800) <= maxWidth) {
                current = candidate;
                index += 1;
                continue;
              }

              lines.push(current);
              current = "";

              if (lines.length >= maximumLines - 1) {
                let finalLine = characters.slice(index).join("");
                while (
                  finalLine.length > 0 &&
                  measureLogicalText(`${finalLine}…`, fontSize, 800) > maxWidth
                ) {
                  finalLine = Array.from(finalLine).slice(0, -1).join("");
                }
                lines.push(`${finalLine}…`);
                return lines;
              }
            }

            if (current) lines.push(current);
            return lines.slice(0, maximumLines);
          }

          function getDanmakuLayout(key = "", text = "") {
            const title = Boolean(document.querySelector("#titleInput")?.value.trim());
            const subtitle = Boolean(document.querySelector("#subtitleInput")?.value.trim());
            const headerBottom = subtitle ? 104 : title ? 72 : 22;
            const uiScale = getUiScale();
            const padding = Math.max(14, Math.round(18 * uiScale));
            const labelFontSize = Math.max(11, Math.round(14 * uiScale));
            const textFontSize = Math.max(15, Math.round(20 * uiScale));
            const lineHeight = Math.max(21, Math.round(26 * uiScale));
            const labelAreaHeight = Math.max(22, Math.round(25 * uiScale));
            const labelTextGap = Math.max(6, Math.round(8 * uiScale));
            const sideInset = Math.max(
              Math.round(DANMAKU_BASE_SIDE_INSET * uiScale),
              Math.round(WIDTH * 0.030)
            );
            const availableWidth = Math.max(
              Math.round(DANMAKU_BASE_MIN_WIDTH * uiScale),
              WIDTH - sideInset * 2
            );
            const preferredWidth = WIDTH < HEIGHT
              ? availableWidth
              : Math.min(Math.round(720 * uiScale), availableWidth);
            const cardWidth = Math.max(1, Math.round(preferredWidth));
            const startX = Math.round((WIDTH - cardWidth) / 2);
            const textMaxWidth = Math.max(56, cardWidth - padding * 2);

            let reservedLineCount = 1;
            danmakuMap.forEach(value => {
              reservedLineCount = Math.max(
                reservedLineCount,
                wrapDanmakuText(value, textMaxWidth, textFontSize, 3).length || 1
              );
            });
            reservedLineCount = Math.min(3, reservedLineCount);

            const textLines = wrapDanmakuText(
              text,
              textMaxWidth,
              textFontSize,
              reservedLineCount
            );
            const cardHeight =
              padding +
              labelAreaHeight +
              labelTextGap +
              reservedLineCount * lineHeight +
              padding;
            const cardRadius = Math.max(10, Math.round(14 * uiScale));
            const cardY = headerBottom + Math.max(10, Math.round(12 * uiScale));
            const chartGap = Math.max(16, Math.round(20 * uiScale));

            return {
              startX,
              cardY,
              cardWidth,
              cardHeight,
              cardRadius,
              padding,
              chartTop: cardY + cardHeight + chartGap + 42,
              labelText: `节点 · ${key}`,
              labelOffsetX: padding,
              labelBaseline: padding + labelFontSize,
              textOffsetX: padding,
              textBaseline: padding + labelAreaHeight + labelTextGap + textFontSize,
              textMaxWidth,
              labelFontSize,
              textFontSize,
              lineHeight,
              textLines,
              dotRadius: Math.max(3, Math.round(4.5 * uiScale)),
              dotLabelGap: Math.max(8, Math.round(10 * uiScale))
            };
          }
'''
          )

          patch = replace_between(
              patch,
              "  function getPlotPanelBounds() {",
              "  function getDateLayout(text = \"\") {",
              '''  function getPlotPanelBounds() {
            const top = margin.top - 42;
            const bottom = Math.max(
              top + 180,
              HEIGHT - margin.bottom + 18 - getAspectBottomLift()
            );
            return {
              left: CHART_SIDE_PADDING,
              right: WIDTH - CHART_SIDE_PADDING,
              top,
              bottom,
              width: WIDTH - CHART_SIDE_PADDING * 2,
              height: Math.max(1, bottom - top)
            };
          }
'''
          )

          patch = patch.replace(
              "      y: panel.bottom - DATE_BOTTOM_PADDING,",
              "      y: panel.bottom - getDateBottomInset(),"
          )

          patch = replace_between(
              patch,
              "  function applyChartGeometry() {",
              "  updateResponsiveChartMargins = function patchedUpdateResponsiveChartMargins() {",
              '''  function applyChartGeometry() {
            const panel = getPlotPanelBounds();
            plotSurface
              .attr("x", panel.left)
              .attr("y", panel.top)
              .attr("width", panel.width)
              .attr("height", panel.height);

            applyDateLayout();
            valueLabelClipRect
              .attr("x", panel.left)
              .attr("width", Math.max(1, panel.width))
              .attr("height", HEIGHT);
            xScale.range([margin.left, WIDTH - margin.right]);
            yScale.range(getYScaleTargetRange(categories.length));
            syncCaptureAspectRatio();
          }
'''
          )

          patch = patch.replace(
              "    const layout = getDanmakuLayout(entry.key);",
              "    const layout = getDanmakuLayout(entry.key, entry.text);"
          )

          svg_text_start = '''    const textElement = danmakuGroup.append("text")'''
          svg_text_end = '''  }

  renderFrame = function patchedRenderFrame'''
          start = patch.index(svg_text_start)
          end = patch.index(svg_text_end, start)
          svg_replacement = '''    const textElement = danmakuGroup.append("text")
              .attr("x", layout.startX + layout.textOffsetX)
              .attr("font-size", layout.textFontSize)
              .attr("font-weight", 800)
              .attr("fill", "#0f172a");

            layout.textLines.forEach((line, index) => {
              textElement.append("tspan")
                .attr("x", layout.startX + layout.textOffsetX)
                .attr("y", layout.cardY + layout.textBaseline + index * layout.lineHeight)
                .text(line);
            });
'''
          patch = patch[:start] + svg_replacement + "\n" + patch[end:]

          patch = replace_between(
              patch,
              "  function getPixelDanmakuLayout(outputWidth, outputHeight, entry) {",
              "  function getDanmakuCacheKey(outputWidth, outputHeight, entry, pixelLayout) {",
              '''  function getPixelDanmakuLayout(outputWidth, outputHeight, entry) {
            const logical = getDanmakuLayout(entry?.key || "", entry?.text || "");
            const scale = Math.min(outputWidth / WIDTH, outputHeight / HEIGHT);
            const offsetX = (outputWidth - WIDTH * scale) / 2;
            const offsetY = (outputHeight - HEIGHT * scale) / 2;

            return {
              x: Math.round(offsetX + logical.startX * scale),
              y: Math.round(offsetY + logical.cardY * scale),
              width: Math.max(1, Math.round(logical.cardWidth * scale)),
              height: Math.max(1, Math.round(logical.cardHeight * scale)),
              radius: Math.max(1, Math.round(logical.cardRadius * scale)),
              paddingX: Math.max(1, Math.round(logical.labelOffsetX * scale)),
              labelBaseline: Math.round(logical.labelBaseline * scale),
              textBaseline: Math.round(logical.textBaseline * scale),
              labelFontSize: Math.max(8, Math.round(logical.labelFontSize * scale)),
              textFontSize: Math.max(10, Math.round(logical.textFontSize * scale)),
              lineHeight: Math.max(12, Math.round(logical.lineHeight * scale)),
              textLines: logical.textLines,
              dotRadius: Math.max(2, Math.round(logical.dotRadius * scale)),
              dotLabelGap: Math.max(5, Math.round(logical.dotLabelGap * scale)),
              maxTextWidth: Math.max(20, Math.round(logical.textMaxWidth * scale)),
              lineWidth: Math.max(1, Math.round(scale))
            };
          }
'''
          )

          old_canvas_text = '''    context.fillStyle = "#0f172a";
            context.font =
              `800 ${pixelLayout.textFontSize}px ` +
              '"Microsoft YaHei","PingFang SC",Arial,sans-serif';
            context.fillText(
              entry.text,
              pixelLayout.paddingX,
              pixelLayout.textBaseline,
              pixelLayout.maxTextWidth
            );'''
          new_canvas_text = '''    context.fillStyle = "#0f172a";
            context.font =
              `800 ${pixelLayout.textFontSize}px ` +
              '"Microsoft YaHei","PingFang SC",Arial,sans-serif';
            pixelLayout.textLines.forEach((line, index) => {
              context.fillText(
                line,
                pixelLayout.paddingX,
                pixelLayout.textBaseline + index * pixelLayout.lineHeight
              );
            });'''
          if old_canvas_text not in patch:
              raise SystemExit("canvas danmaku text block not found")
          patch = patch.replace(old_canvas_text, new_canvas_text)

          patch = patch.replace(
              '''    getYScaleTargetRange = function exportFullHeightRange() {
              return [margin.top, HEIGHT - margin.bottom];
            };''',
              '''    getYScaleTargetRange = function exportPanelRange() {
              const panel = getPlotPanelBounds();
              return [margin.top, Math.max(margin.top + 1, panel.bottom - 18)];
            };'''
          )

          patch = patch.replace(
              '''    const logical = getDateLayout(text);
            const scaleX = outputWidth / WIDTH;
            const scaleY = outputHeight / HEIGHT;
            const fontScale = Math.min(scaleX, scaleY);''',
              '''    const logical = getDateLayout(text);
            const fontScale = Math.min(outputWidth / WIDTH, outputHeight / HEIGHT);
            const offsetX = (outputWidth - WIDTH * fontScale) / 2;
            const offsetY = (outputHeight - HEIGHT * fontScale) / 2;'''
          ).replace(
              "      Math.round(logical.x * scaleX),",
              "      Math.round(offsetX + logical.x * fontScale),"
          ).replace(
              "      Math.round(logical.y * scaleY),",
              "      Math.round(offsetY + logical.y * fontScale),"
          ).replace(
              "      Math.max(40, Math.round(logical.maxTextWidth * scaleX))",
              "      Math.max(40, Math.round(logical.maxTextWidth * fontScale))"
          )

          main = (
              main.rstrip() +
              "\n\n    " + marker + "\n" +
              patch.strip() +
              "\n    // END: integrated responsive layout and stable danmaku\n"
          )
          index = index.replace('  <script src="danmaku-fix.js"></script>\n', '')
          index = index.replace('  <script src="danmaku-fix.js"></script>\r\n', '')

          main_path.write_text(main, encoding="utf-8")
          index_path.write_text(index, encoding="utf-8")
          patch_path.unlink()
          workflow_path.unlink()
          PY

          node --check main.js

      - name: Commit integrated implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.js index.html danmaku-fix.js .github/workflows/integrate-danmaku-main.yml
          git commit -m "将自适应弹幕与画幅布局合并至 main.js"
          git push origin HEAD:master
